<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-document-title="accountPageTitle">My Account | Simba Supermarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="preferences.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="account">
    <div class="site-shell checkout-shell">
      <header class="topbar">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/simba-logo.svg" alt="Simba Supermarket logo" />
          <span>
            <strong>Simba Supermarket</strong>
            <small data-i18n="accountTagline">Customer account</small>
          </span>
        </a>

        <div class="topbar-actions">
          <a class="ghost-button" href="index.html" data-i18n="accountNavStorefront">Storefront</a>
          <a class="ghost-button" href="branches.html" data-i18n="accountNavBranches">Branches</a>
          <a class="ghost-button" href="checkout.html" data-i18n="accountNavCheckout">Checkout</a>
          <label class="lang-picker">
            <span class="sr-only" data-i18n="accountLanguageLabel">Language</span>
            <select id="languageSelect" aria-label="Select language" data-i18n-aria-label="accountLanguageLabel">
              <option value="en">English</option>
              <option value="fr">Francais</option>
              <option value="rw">Kinyarwanda</option>
            </select>
          </label>
          <button id="themeToggle" class="icon-button" type="button" data-i18n="accountTheme">Theme</button>
        </div>
      </header>

      <main class="account-layout">
        <div id="accountAlert" class="site-alert hidden" aria-live="polite"></div>

        <section id="accountAuthView" class="admin-auth-grid">
          <section class="checkout-form-card">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="accountWelcomeBack">Welcome back</p>
              <h1 data-i18n="accountSignInTitle">Sign in</h1>
            </div>

            <p id="accountServiceNotice" class="checkout-message" aria-live="polite"></p>

            <div class="summary-box">
              <strong>Buyer / Customer Demo Account</strong>
              <p class="toolbar-note">Email: buyer@test.com</p>
              <p class="toolbar-note">Password: password123</p>
            </div>

            <form id="loginForm" class="checkout-form">
              <label class="field">
                <span data-i18n="accountEmailLabel">Email</span>
                <input type="email" name="email" placeholder="you@example.com" data-i18n-placeholder="accountEmailPlaceholder" required />
              </label>
              <label class="field">
                <span data-i18n="accountPasswordLabel">Password</span>
                <input type="password" name="password" placeholder="Your password" data-i18n-placeholder="accountPasswordPlaceholder" required />
              </label>
              <button class="primary-button full-width" type="submit" data-i18n="accountSignInAction">Sign in</button>
              <p id="loginMessage" class="checkout-message" aria-live="polite"></p>
            </form>

            <button id="googleSignInButton" class="ghost-button full-width" type="button" data-i18n="accountGoogleAction">Continue with Google</button>
            <p id="googleSignInMessage" class="checkout-message" aria-live="polite"></p>

            <div class="summary-box">
              <div class="toolbar-header compact-header">
                <div>
                  <p class="eyebrow" data-i18n="accountResetEyebrow">Reset access</p>
                  <h2 data-i18n="accountForgotTitle">Forgot your password?</h2>
                </div>
              </div>
              <form id="forgotPasswordForm" class="checkout-form">
                <label class="field">
                  <span data-i18n="accountEmailLabel">Email</span>
                  <input type="email" name="email" placeholder="you@example.com" data-i18n-placeholder="accountEmailPlaceholder" required />
                </label>
                <button class="ghost-button full-width" type="submit" data-i18n="accountResetAction">Send reset code</button>
                <p id="forgotPasswordMessage" class="checkout-message" aria-live="polite"></p>
              </form>
              <form id="resetPasswordConfirmForm" class="checkout-form">
                <label class="field">
                  <span data-i18n="accountEmailLabel">Email</span>
                  <input type="email" name="email" placeholder="you@example.com" data-i18n-placeholder="accountEmailPlaceholder" required />
                </label>
                <label class="field">
                  <span data-i18n="accountResetCodeLabel">Reset code</span>
                  <input type="text" name="code" placeholder="123456" data-i18n-placeholder="accountResetCodePlaceholder" inputmode="numeric" maxlength="6" required />
                </label>
                <label class="field">
                  <span data-i18n="accountResetNewPasswordLabel">New password</span>
                  <input type="password" name="newPassword" placeholder="Enter a new password" data-i18n-placeholder="accountResetNewPasswordPlaceholder" required />
                </label>
                <button class="primary-button full-width" type="submit" data-i18n="accountResetConfirmAction">Verify code and reset password</button>
                <p id="resetPasswordConfirmMessage" class="checkout-message" aria-live="polite"></p>
              </form>
            </div>
          </section>

          <section class="checkout-form-card">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="accountNewCustomer">New customer</p>
              <h2 data-i18n="accountCreateTitle">Create account</h2>
            </div>

            <form id="registerForm" class="checkout-form">
              <label class="field">
                <span data-i18n="accountFullNameLabel">Full name</span>
                <input type="text" name="name" placeholder="Aline Uwimana" data-i18n-placeholder="accountFullNamePlaceholder" required />
              </label>
              <label class="field">
                <span data-i18n="accountEmailLabel">Email</span>
                <input type="email" name="email" placeholder="you@example.com" data-i18n-placeholder="accountEmailPlaceholder" required />
              </label>
              <label class="field">
                <span data-i18n="accountPhoneLabel">Phone number</span>
                <input type="tel" name="phone" placeholder="+250 788 123 456" data-i18n-placeholder="accountPhonePlaceholder" />
              </label>
              <label class="field">
                <span data-i18n="accountAddressLabel">Default address</span>
                <input type="text" name="address" placeholder="Kigali, KG 11 Ave" data-i18n-placeholder="accountAddressPlaceholder" />
              </label>
              <label class="field">
                <span data-i18n="accountPasswordLabel">Password</span>
                <input type="password" name="password" placeholder="Create a password" data-i18n-placeholder="accountCreatePasswordPlaceholder" required />
              </label>
              <button class="primary-button full-width" type="submit" data-i18n="accountCreateAction">Create account</button>
              <p id="registerMessage" class="checkout-message" aria-live="polite"></p>
            </form>
          </section>
        </section>

        <section id="accountDashboard" class="showcase-panel hidden">
          <div class="toolbar-header">
            <div>
              <p class="eyebrow" data-i18n="accountDashboardEyebrow">My account</p>
              <h1 id="accountGreeting" data-i18n="accountDashboardTitle">Your profile</h1>
            </div>
            <div class="topbar-actions">
              <a class="ghost-button" href="checkout.html" data-i18n="accountNavCheckout">Checkout</a>
              <button id="logoutAccount" class="ghost-button" type="button" data-i18n="accountLogoutAction">Log out</button>
            </div>
          </div>

          <div id="accountProfile" class="admin-stats"></div>

          <section class="admin-section">
            <div class="toolbar-header compact-header">
              <div>
                <p class="eyebrow" data-i18n="accountOrdersEyebrow">My orders</p>
                <h2 data-i18n="accountOrdersTitle">Order history</h2>
              </div>
            </div>
            <div id="accountOrders" class="admin-orders"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="config.js" defer></script>
    <script src="branches-data.js" defer></script>
    <script src="account.js" defer></script>
  </body>
</html>
