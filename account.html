<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account | Simba Supermarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="account">
    <div class="site-shell checkout-shell">
      <header class="topbar">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/simba-logo.svg" alt="Simba Supermarket logo" />
          <span>
            <strong>Simba Supermarket</strong>
            <small>Customer account</small>
          </span>
        </a>

        <div class="topbar-actions">
          <a class="ghost-button" href="index.html">Storefront</a>
          <a class="ghost-button" href="branches.html">Branches</a>
          <a class="ghost-button" href="checkout.html">Checkout</a>
        </div>
      </header>

      <main class="account-layout">
        <section id="accountAuthView" class="admin-auth-grid">
          <section class="checkout-form-card">
            <div class="section-heading">
              <p class="eyebrow">Welcome back</p>
              <h1>Sign in</h1>
            </div>

            <form id="loginForm" class="checkout-form">
              <label class="field">
                <span>Email</span>
                <input type="email" name="email" placeholder="you@example.com" required />
              </label>
              <label class="field">
                <span>Password</span>
                <input type="password" name="password" placeholder="Your password" required />
              </label>
              <button class="primary-button full-width" type="submit">Sign in</button>
              <p id="loginMessage" class="checkout-message" aria-live="polite"></p>
            </form>

            <button id="googleSignInButton" class="ghost-button full-width" type="button">Continue with Google</button>
            <p id="googleSignInMessage" class="checkout-message" aria-live="polite"></p>

            <div class="summary-box">
              <div class="toolbar-header compact-header">
                <div>
                  <p class="eyebrow">Reset access</p>
                  <h2>Forgot your password?</h2>
                </div>
              </div>
              <form id="forgotPasswordForm" class="checkout-form">
                <label class="field">
                  <span>Email</span>
                  <input type="email" name="email" placeholder="you@example.com" required />
                </label>
                <button class="ghost-button full-width" type="submit">Send reset link</button>
                <p id="forgotPasswordMessage" class="checkout-message" aria-live="polite"></p>
              </form>
            </div>
          </section>

          <section class="checkout-form-card">
            <div class="section-heading">
              <p class="eyebrow">New customer</p>
              <h2>Create account</h2>
            </div>

            <form id="registerForm" class="checkout-form">
              <label class="field">
                <span>Full name</span>
                <input type="text" name="name" placeholder="Aline Uwimana" required />
              </label>
              <label class="field">
                <span>Email</span>
                <input type="email" name="email" placeholder="you@example.com" required />
              </label>
              <label class="field">
                <span>Phone number</span>
                <input type="tel" name="phone" placeholder="+250 788 123 456" />
              </label>
              <label class="field">
                <span>Default address</span>
                <input type="text" name="address" placeholder="Kigali, KG 11 Ave" />
              </label>
              <label class="field">
                <span>Password</span>
                <input type="password" name="password" placeholder="Create a password" required />
              </label>
              <button class="primary-button full-width" type="submit">Create account</button>
              <p id="registerMessage" class="checkout-message" aria-live="polite"></p>
            </form>
          </section>
        </section>

        <section id="accountDashboard" class="showcase-panel hidden">
          <div class="toolbar-header">
            <div>
              <p class="eyebrow">My account</p>
              <h1 id="accountGreeting">Your profile</h1>
            </div>
            <div class="topbar-actions">
              <a class="ghost-button" href="checkout.html">Checkout</a>
              <button id="logoutAccount" class="ghost-button" type="button">Log out</button>
            </div>
          </div>

          <div id="accountProfile" class="admin-stats"></div>

          <section class="admin-section">
            <div class="toolbar-header compact-header">
              <div>
                <p class="eyebrow">My orders</p>
                <h2>Order history</h2>
              </div>
            </div>
            <div id="accountOrders" class="admin-orders"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="config.js" defer></script>
    <script src="branches-data.js" defer></script>
    <script src="account.js" defer></script>
  </body>
</html>
