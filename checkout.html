<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Simba Supermarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="checkout">
    <div class="site-shell checkout-shell">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-mark">S</span>
          <span>
            <strong>Simba Supermarket</strong>
            <small data-i18n="checkoutBadge">Safe and simple checkout</small>
          </span>
        </a>

        <div class="topbar-actions">
          <label class="lang-picker">
            <select id="languageSelect" aria-label="Select language">
              <option value="en">English</option>
              <option value="fr">Francais</option>
              <option value="rw">Kinyarwanda</option>
            </select>
          </label>
          <button id="themeToggle" class="icon-button" type="button">Theme</button>
        </div>
      </header>

      <main class="checkout-layout">
        <section class="checkout-form-card">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="deliveryInfo">Delivery details</p>
            <h1 data-i18n="checkoutTitle">Complete your order</h1>
          </div>

          <form id="checkoutForm" class="checkout-form">
            <label class="field">
              <span data-i18n="fullName">Full name</span>
              <input type="text" name="name" placeholder="Aline Uwimana" required />
            </label>

            <label class="field">
              <span data-i18n="phoneNumber">Phone number</span>
              <input type="tel" name="phone" placeholder="+250 788 123 456" required />
            </label>

            <label class="field">
              <span data-i18n="address">Delivery address</span>
              <input type="text" name="address" placeholder="Kigali, KG 11 Ave" required />
            </label>

            <label class="field">
              <span data-i18n="notes">Delivery notes</span>
              <textarea name="notes" rows="4" placeholder="Apartment number, landmarks, preferred time"></textarea>
            </label>

            <div class="payment-panel">
              <div class="section-heading">
                <p class="eyebrow">MoMo</p>
                <h2 data-i18n="paymentTitle">Simulated Mobile Money payment</h2>
              </div>

              <label class="field">
                <span data-i18n="network">Network</span>
                <select name="network">
                  <option>MTN MoMo</option>
                  <option>Airtel Money</option>
                </select>
              </label>

              <label class="field">
                <span data-i18n="momoNumber">MoMo number</span>
                <input type="tel" name="momoNumber" placeholder="+250 78X XXX XXX" required />
              </label>
            </div>

            <button class="primary-button full-width" type="submit" data-i18n="placeOrder">Place order</button>
            <p id="checkoutMessage" class="checkout-message" aria-live="polite"></p>
          </form>
        </section>

        <aside class="checkout-summary-card">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="orderSummary">Order summary</p>
            <h2 data-i18n="cartTitle">Shopping cart</h2>
          </div>
          <div id="checkoutItems" class="checkout-items"></div>
          <div class="summary-box">
            <div class="summary-row">
              <span data-i18n="subtotal">Subtotal</span>
              <strong id="checkoutSubtotal">RWF 0</strong>
            </div>
            <div class="summary-row">
              <span data-i18n="deliveryFee">Delivery fee</span>
              <strong id="deliveryFee">RWF 2,000</strong>
            </div>
            <div class="summary-row total-row">
              <span data-i18n="total">Total</span>
              <strong id="checkoutTotal">RWF 0</strong>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="checkout.js" defer></script>
  </body>
</html>
