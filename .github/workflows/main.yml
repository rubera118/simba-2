name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript syntax
        run: |
          for file in server.js script.js product.js checkout.js account.js admin.js branches.js branches-store.js about.js contact.js groq-client.js config.js branches-data.js products-data.js; do
            if [ -f "$file" ]; then
              node --check "$file"
            fi
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html product.html checkout.html account.html admin.html branches.html branch-store.html about.html contact.html styles.css script.js product.js checkout.js account.js admin.js branches.js branch-store.js about.js contact.js config.js groq-client.js branches-data.js products-data.js products.json _site/
          cp -R assets _site/assets

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
