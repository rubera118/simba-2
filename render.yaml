services:
  - type: web
    name: simba-supermarket-api
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SIMBA_ADMIN_PASSWORD
        value: simba-admin-2026
      - key: SIMBA_TOKEN_SECRET
        generateValue: true
      - key: SIMBA_ALLOWED_ORIGINS
        value: "https://rubera118.github.io,https://simba-supermarket-api.onrender.com"
      - key: SIMBA_GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SIMBA_EMAIL_FROM
        sync: false
