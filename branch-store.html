<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-document-title="branchStorePageTitle">Branch Store | Simba Supermarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="preferences.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="branch-store">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Simba Supermarket home">
          <img class="brand-logo" src="assets/simba-logo.svg" alt="Simba Supermarket logo" />
          <span>
            <strong>Simba Supermarket</strong>
            <small data-i18n="branchStoreTagline">Branch mini store</small>
          </span>
        </a>

        <div class="topbar-actions">
          <a class="ghost-button" href="./index.html" data-i18n="branchStoreNavHome">Home</a>
          <a class="ghost-button" href="./branches.html" data-i18n="branchStoreNavBranches">Branches</a>
          <a class="ghost-button" href="./checkout.html" data-i18n="branchStoreNavCheckout">Checkout</a>
          <label class="lang-picker">
            <span class="sr-only" data-i18n="branchStoreLanguageLabel">Language</span>
            <select id="languageSelect" aria-label="Select language" data-i18n-aria-label="branchStoreLanguageLabel">
              <option value="en">English</option>
              <option value="fr">Francais</option>
              <option value="rw">Kinyarwanda</option>
            </select>
          </label>
          <button id="themeToggle" class="icon-button" type="button" data-i18n="branchStoreTheme">Theme</button>
        </div>
      </header>

      <main class="branch-store-layout">
        <section id="branchHero" class="branch-store-hero"></section>

        <section class="showcase-panel branch-store-toolbar">
          <div class="toolbar-header">
            <div>
              <p class="eyebrow" data-i18n="branchStoreSearchEyebrow">Branch search</p>
              <h2 data-i18n="branchStoreSearchTitle">Ask this branch what you need</h2>
            </div>
            <p class="toolbar-note" data-i18n="branchStoreSearchText">
              Search this branch like a mini store homepage with branch stock already applied.
            </p>
          </div>

          <div class="search-band-form">
            <label class="field search-band-field">
              <span data-i18n="branchStoreSearchLabel">Conversational search</span>
              <input
                id="branchStoreSearchInput"
                type="search"
                placeholder="I need something for breakfast"
                data-i18n-placeholder="branchStoreSearchPlaceholder"
              />
            </label>
            <div class="assistant-actions">
              <button id="branchStoreSearchButton" class="primary-button" type="button" data-i18n="branchStoreSearchAction">Search</button>
              <a class="ghost-button" href="./checkout.html" data-i18n="branchStoreCheckoutAction">Checkout</a>
            </div>
          </div>

          <div class="chip-row">
            <button class="chip branch-store-prompt" type="button" data-query="fresh milk">Fresh milk</button>
            <button class="chip branch-store-prompt" type="button" data-query="breakfast">Breakfast</button>
            <button class="chip branch-store-prompt" type="button" data-query="drinks">Cold drinks</button>
            <button class="chip branch-store-prompt" type="button" data-query="cleaning">Cleaning</button>
          </div>
        </section>

        <section class="trust-strip trust-strip-modern">
          <article>
            <strong data-i18n="branchStoreInfoLocation">Location</strong>
            <span id="branchInfoAddress">-</span>
          </article>
          <article>
            <strong data-i18n="branchStoreInfoHours">Working hours</strong>
            <span id="branchInfoHours">-</span>
          </article>
          <article>
            <strong data-i18n="branchStoreInfoContact">Contact</strong>
            <span id="branchInfoPhone">-</span>
          </article>
        </section>

        <section class="status-row">
          <p id="branchStoreResultsSummary"></p>
        </section>

        <section id="branchStoreProducts" class="catalog-grid" aria-live="polite"></section>
      </main>
    </div>

    <script src="config.js" defer></script>
    <script src="branches-data.js" defer></script>
    <script src="products-data.js" defer></script>
    <script src="branch-store.js" defer></script>
  </body>
</html>
